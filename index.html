<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時數位時鐘 - Modern Clock</title>
    <meta name="description" content="一個使用 HTML, CSS 和 JavaScript 製作的精美動態數位時鐘。">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="clock-container">
        <div class="date" id="date">載入中...</div>
        <div class="time-wrapper">
            <span class="time" id="time">00:00:00</span>
            <span class="ampm" id="ampm">AM</span>
        </div>
        <div class="day" id="day">星期一</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
